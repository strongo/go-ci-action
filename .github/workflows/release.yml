name: Release

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        required: false
        description: >-
          Token with read access to private Go modules. Used in the git URL
          username slot so GOPRIVATE fetches (e.g. GoReleaser's `go mod tidy`
          before-hook) can pull private dependencies. Only needed when GOPRIVATE
          is set; omit for repos with only public dependencies.
      GORELEASER_GITHUB_TOKEN:
        required: false
        description: >-
          Cross-repo PAT forwarded to GoReleaser as $GORELEASER_GITHUB_TOKEN.
          Used by publishers that push to OTHER repos the default GITHUB_TOKEN
          cannot reach — Homebrew tap/cask, Scoop bucket, and (unless a separate
          WINGET_GITHUB_TOKEN is given) the WinGet fork. Reference it in your
          `.goreleaser.yaml` as `{{ .Env.GORELEASER_GITHUB_TOKEN }}`. Omit for
          repos whose only "publisher" is the GitHub release itself.
      WINGET_GITHUB_TOKEN:
        required: false
        description: >-
          Optional PAT forwarded to GoReleaser as $WINGET_GITHUB_TOKEN, for the
          WinGet publisher's cross-fork PR to microsoft/winget-pkgs (needs a
          classic PAT with `public_repo`). Provide only if it must differ from
          GORELEASER_GITHUB_TOKEN; otherwise reference GORELEASER_GITHUB_TOKEN in
          the winget block instead.
      AUR_SSH_PRIVATE_KEY:
        required: false
        description: >-
          Optional AUR SSH private key, forwarded to GoReleaser as
          $AUR_SSH_PRIVATE_KEY. GoReleaser's `aurs` publisher accepts the key
          contents directly (`private_key: {{ .Env.AUR_SSH_PRIVATE_KEY }}`); the
          key must not be password-protected.
    inputs:
      GOPRIVATE:
        type: string
        required: false
        default: ''
        description: >-
          Comma-separated private Go module path prefixes. Sets GOPRIVATE for go
          commands run during release (notably GoReleaser before-hooks). Leave
          empty for repos with only public dependencies.
      goprivate_git_host:
        type: string
        required: false
        default: 'github.com'
        description: >-
          URL prefix (host or host/org) authenticated with GH_TOKEN when fetching
          private Go modules. Defaults to github.com; set e.g. github.com/my-org
          to scope the token URL-rewrite narrower.
      go_version:
        type: string
        required: false
        default: '1.26'
        description: >-
          Go toolchain version for setup-go. Defaults to '1.26'. Set to match
          your module's go.mod (e.g. '1.26.5') when a build/release needs a
          specific patch release.
      goreleaser_extra_args:
        type: string
        required: false
        default: ''
        description: >-
          Extra arguments appended to `goreleaser release --clean`, e.g.
          `--skip=chocolatey,snapcraft` when those publishers run in a separate
          per-repo job (they need tooling/runners this ubuntu job lacks).
      tag_prefix:
        type: string
        required: false
        default: 'v'
        description: >-
          Prefix for version tags, e.g. "ingitdb/v" for a subdirectory module.
          Defaults to "v". Used when the CD bump path (branch/merge trigger)
          computes and pushes the next tag.
      default_bump:
        type: string
        required: false
        default: 'false'
        description: >-
          Bump level (conventional-commit semantics) applied on a CD run when NO
          conventional commit since the last tag implies one. Default 'false':
          docs/chore/ci-only merges cut no tag and publish nothing (GoReleaser is
          skipped). Set 'patch' to release on every merge to main.
      allow_major_version_bump:
        type: boolean
        required: false
        default: false
        description: >-
          When false (default), a CD run (branch/merge trigger) whose commits
          would bump the MAJOR version is CAPPED to a minor bump, and a warning
          is logged. This is the guard against an accidental v0->v1 (or vN->vN+1)
          jump from a `feat!:` / `BREAKING CHANGE:` commit — which
          conventional-commit parsing treats as a major bump regardless of any
          major_string_token sentinel. Pre-1.0, a breaking change is a minor
          bump; this preserves that. Set true only to intend a real major
          release (or push an explicit vX.0.0 tag, which bypasses the bump).
    outputs:
      tag:
        description: >-
          The tag created by this workflow, or empty when no tag was
          cut (no bumping commits) or the run was already on a tag. Consumers can
          chain per-repo publisher jobs on `needs.<job>.outputs.tag`.
        value: ${{ jobs.release.outputs.tag }}
#  push:
#    tags:
#      - 'v*.*.*'   # triggers only on tags like v1.26.0

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required for GoReleaser to push GitHub releases
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}

    steps:
      # 1. Checkout the code with full history + all tags. Both GoReleaser (changelog /
      #    "current tag" detection) and the version bump step (deriving the next version
      #    from commits since the last tag) fail or under-tag on the default shallow clone.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v7
        with:
          go-version: ${{ inputs.go_version }}

      # Authenticate private-module fetches (GoReleaser's `go mod tidy` hook runs
      # BEFORE the build and will fail to reach private deps otherwise). No-op for
      # repos that don't pass GOPRIVATE.
      - name: Set GitHub access token for GOPRIVATE
        if: ${{ inputs.GOPRIVATE }}
        run: git config --global url."https://${{ secrets.GH_TOKEN }}:x-oauth-basic@${{ inputs.goprivate_git_host }}/".insteadOf "https://${{ inputs.goprivate_git_host }}/"

      # Auto-bump only when the caller triggered on a branch push/merge. On a tag
      # push (github.ref_type == 'tag') the version is already fixed by the tag,
      # so skip the bump and release that exact tag as-is. This lets callers keep
      # an explicit "push a vX.Y.Z tag to release" flow while still sharing this
      # workflow — no auto-bump can override the tag they chose.
      #
      # The bump is two steps: a dry run computes the next version from conventional commits,
      # then a guard caps an accidental
      # MAJOR bump to a minor one (unless allow_major_version_bump) and pushes the
      # final tag itself. We push with plain git (not the action) so the guard's
      # decision is authoritative and the tag string is unambiguous.
      - name: Compute next version (dry run)
        id: bump_dry
        if: ${{ github.ref_type != 'tag' }}
        uses: cycjimmy/semantic-release-action@v6
        with:
          branches: main
          dry_run: true
          ci: false
          tag_format: ${{ inputs.tag_prefix }}${version}
          semantic_version: 24
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # semantic-release intentionally does not publish docs/chore-only changes.
      # Preserve default_bump for callers that explicitly request a release.
      - name: Resolve configured default bump
        id: resolved_bump
        if: ${{ github.ref == 'refs/heads/main' && github.ref_type != 'tag' }}
        env:
          PREV: ${{ steps.bump_dry.outputs.last_release_version }}
          NEXT: ${{ steps.bump_dry.outputs.new_release_version }}
          NEXT_TAG: ${{ steps.bump_dry.outputs.new_release_git_tag }}
          PREV_TAG: ${{ steps.bump_dry.outputs.last_release_git_tag }}
          PREFIX: ${{ inputs.tag_prefix }}
          DEFAULT_BUMP: ${{ inputs.default_bump }}
        run: |
          set -euo pipefail
          if [ -n "$NEXT" ]; then
            printf 'previous_version=%s\nnew_version=%s\nnew_tag=%s\nprevious_tag=%s\n' "$PREV" "$NEXT" "$NEXT_TAG" "$PREV_TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$DEFAULT_BUMP" = "false" ] || [ -z "$DEFAULT_BUMP" ]; then
            exit 0
          fi
          case "$DEFAULT_BUMP" in patch|minor|major) ;; *) echo "Unsupported default_bump: $DEFAULT_BUMP" >&2; exit 1 ;; esac
          latest_tag="$(git tag --list "${PREFIX}*" --sort=-v:refname | head -n 1)"
          previous_version="${latest_tag#"$PREFIX"}"
          if [ -z "$latest_tag" ] || ! [[ "$previous_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            previous_version="0.0.0"
            latest_tag=""
          fi
          IFS=. read -r major minor patch <<< "$previous_version"
          case "$DEFAULT_BUMP" in
            patch) next_version="$major.$minor.$((patch + 1))" ;;
            minor) next_version="$major.$((minor + 1)).0" ;;
            major) next_version="$((major + 1)).0.0" ;;
          esac
          printf 'previous_version=%s\nnew_version=%s\nnew_tag=%s%s\nprevious_tag=%s\n' "$previous_version" "$next_version" "$PREFIX" "$next_version" "$latest_tag" >> "$GITHUB_OUTPUT"

      - name: Determine and push guarded tag
        id: tag
        if: ${{ github.ref == 'refs/heads/main' && github.ref_type != 'tag' && steps.resolved_bump.outputs.new_version != '' }}
        env:
          PREV: ${{ steps.resolved_bump.outputs.previous_version }}
          NEXT: ${{ steps.resolved_bump.outputs.new_version }}
          NEXT_TAG: ${{ steps.resolved_bump.outputs.new_tag }}
          PREV_TAG: ${{ steps.resolved_bump.outputs.previous_tag }}
          ALLOW_MAJOR: ${{ inputs.allow_major_version_bump }}
          PREFIX: ${{ inputs.tag_prefix }}
        run: |
          set -euo pipefail
          # previous_version / new_version are bare SemVer (no prefix).
          prev_major="${PREV%%.*}"
          next_major="${NEXT%%.*}"
          tag="$NEXT_TAG"
          if [ "$ALLOW_MAJOR" != "true" ] && [ -n "$PREV" ] && [ "$next_major" -gt "$prev_major" ]; then
            prev_minor="$(printf '%s' "$PREV" | cut -d. -f2)"
            capped="${prev_major}.$((prev_minor + 1)).0"
            tag="${PREFIX}${capped}"
            echo "::warning title=Major bump blocked::A breaking commit since ${PREV_TAG} would bump the MAJOR version (${PREV} -> ${NEXT}). Capping to ${capped} (pre-1.0 / disallowed-major semantics treat a breaking change as a minor bump). Set allow_major_version_bump: true, or push an explicit vX.0.0 tag, to intend a real major."
          fi
          git tag "$tag"
          git push origin "refs/tags/$tag"
          echo "new_tag=$tag" >> "$GITHUB_OUTPUT"

      - run: git fetch --tags

      # Release the tag on HEAD: the exact tag on a tag-push, or the one the
      # guarded bump just cut on a branch/merge. On a branch/merge with no
      # bumping commit no tag was cut, so HEAD is untagged and there is nothing
      # to release — skip GoReleaser (running it on an untagged commit would
      # fail the job).
      - name: Run GoReleaser
        if: ${{ github.ref_type == 'tag' || steps.tag.outputs.new_tag != '' }}
        uses: goreleaser/goreleaser-action@v7
        with:
          version: v2
          args: release --clean ${{ inputs.goreleaser_extra_args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # required for releases
          GOPRIVATE: ${{ inputs.GOPRIVATE }}
          # Optional cross-repo publisher credentials. Empty when the caller
          # doesn't pass them; GoReleaser only reads the ones its config uses.
          GORELEASER_GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
