name: Standard Go CI workflow

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        required: true
      FIREBASE_PROJECT_ID:
        required: false
      COVERALLS_REPO_TOKEN:
        required: false
      GORELEASER_GITHUB_TOKEN:
        required: false
    inputs:
      code_coverage:
        type: boolean
        required: false
        description: Run code coverage
      disable-version-bumping: # id of input
        type: boolean
        description: 'Disables version bumping - use for apps that are not versioned'
        required: false
      install-firebase-tools: # id of input
        type: boolean
        description: 'Installs Firebase tools'
        required: false
        default: false
      lint-timeout: # id of input
        type: string
        description: 'How long to wait for lint to complete before failing'
        required: false
        default: '3m'
      GOOGLE_APPLICATION_CREDENTIALS:
        type: string
        description: 'Path to Google Application Credentials file'
        required: false
      GOPRIVATE:
        type: string
        description: 'List of private Go modules'
        required: false
        default: ''
      goprivate_git_host:
        type: string
        description: 'URL prefix (host or host/org) authenticated with GH_TOKEN when fetching private Go modules. Defaults to github.com (host-wide); set to e.g. github.com/my-org to scope narrower.'
        required: false
        default: 'github.com'
      additional_go_test_path:
        type: string
        required: false
        description: Path a module to sub-module to be tested in form of "./module_dir"
      min_test_coverage_percent:
        type: number
        required: false
        description: 'Minimum test coverage percentage required to pass the build'
      run-goreleaser:
        type: boolean
        description: 'Run GoReleaser'
        required: false
        default: false
      cgo_enabled:
        type: boolean
        description: 'Build and test with cgo (sets CGO_ENABLED=1). Defaults to false (CGO_ENABLED=0) for pure-Go, statically-linked, cross-compilable builds.'
        required: false
        default: false
      tag_prefix:
        type: string
        description: 'Prefix for version tags, e.g. "ingitdb/v" for a subdirectory module. Defaults to "v".'
        required: false
        default: 'v'
      working_directory:
        type: string
        description: 'Working directory for all go commands. Useful for repos where the Go module lives in a subdirectory. Defaults to repo root.'
        required: false
        default: '.'
      allow_major_version_bump:
        type: boolean
        description: 'Allow automatic major version bump when a commit message contains the major string token. Disabled by default to prevent accidental major bumps.'
        required: false
        default: false
      default_bump:
        type: string
        description: >-
          Bump level applied when no conventional commit since the last tag implies one
          (conventional-commit bump semantics). "patch" (the default, preserving prior behaviour)
          cuts a patch release on every push/merge to main; set to "false" to only cut a
          tag when the commits since the last tag contain feat:/fix:/BREAKING conventional
          messages (no release for docs/chore/ci-only changes).
        required: false
        default: 'patch'
      build_command:
        type: string
        description: >-
          Shell command executed by the Build job after dependencies are downloaded.
          Defaults to validating every package with `go build ./...`.
        required: false
        default: 'go build ./...'
      artifact_name:
        type: string
        description: >-
          Optional name for a Build-job artifact. Set together with artifact_path
          to publish a deployable build output from this same job.
        required: false
        default: ''
      artifact_path:
        type: string
        description: >-
          Optional newline-separated artifact paths, relative to the repository root.
          Set together with artifact_name.
        required: false
        default: ''
      artifact_retention_days:
        type: number
        description: Number of days to retain an optional Build-job artifact.
        required: false
        default: 7
      artifact_on_main_only:
        type: boolean
        description: Upload an optional Build-job artifact only for main-branch runs.
        required: false
        default: false

jobs:

  go_lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    env:
      CGO_ENABLED: ${{ inputs.cgo_enabled && '1' || '0' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26'
          # Cache restore/save is owned explicitly below. Letting setup-go save
          # from both parallel jobs causes a cold-cache reservation race.
          cache: false

      # Both jobs may restore the same immutable cache. Only Build & test saves
      # a missing key, after it has successfully compiled and tested the repo.
      # The key includes every Go input that can affect compiled artifacts.
      - name: Restore Go dependencies and build cache
        id: restore_go_cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-cache-${{ runner.os }}-${{ runner.arch }}-go1.26-cgo${{ inputs.cgo_enabled && '1' || '0' }}-${{ hashFiles(format('{0}/go.sum', inputs.working_directory)) }}

      - name: Set GitHub access token for GOPRIVATE
        if: ${{ inputs.GOPRIVATE }}
        run: git config --global url."https://${{ secrets.GH_TOKEN }}:x-oauth-basic@${{ inputs.goprivate_git_host }}/".insteadOf "https://${{ inputs.goprivate_git_host }}/"

      - name: Download dependencies
        run: go mod download all
        shell: bash
        env:
          GOPRIVATE: ${{ inputs.GOPRIVATE }}

      - run: go vet ./...
        shell: bash

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          #          version: v2.0

          args: --timeout=${{ inputs.lint-timeout }}

          # Optional: working directory, useful for monorepos
          working-directory: ${{ inputs.working_directory }}

          # Optional: golangci-lint command line arguments.
          # args: --issues-exit-code=0

          # Optional: show only new issues if it's a pull request. The default value is `false`.
          # only-new-issues: true

          # Optional: if set to true then the all caching functionality will be complete disabled,
          #           takes precedence over all other caching options.
          # The action cache is intentionally disabled. Its ~120 MB restore and
          # save frequently cost more than the analysis it avoids, and periodic
          # invalidation creates multi-minute post-job variance.
          skip-cache: true

          # Optional: if set to true then the action don't cache or restore ~/.cache/go-build.
          # skip-build-cache: true

  go_test_build:
    name: Build & test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    env:
      CGO_ENABLED: ${{ inputs.cgo_enabled && '1' || '0' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.26'
          # The Build & test job is the sole writer for the shared Go cache;
          # see the matching restore in Lint above.
          cache: false

      - name: Restore Go dependencies and build cache
        id: restore_go_cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-cache-${{ runner.os }}-${{ runner.arch }}-go1.26-cgo${{ inputs.cgo_enabled && '1' || '0' }}-${{ hashFiles(format('{0}/go.sum', inputs.working_directory)) }}

      - name: Set GitHub access token for GOPRIVATE
        if: ${{ inputs.GOPRIVATE }}
        run: git config --global url."https://${{ secrets.GH_TOKEN }}:x-oauth-basic@${{ inputs.goprivate_git_host }}/".insteadOf "https://${{ inputs.goprivate_git_host }}/"

      - name: Download dependencies
        run: go mod download all
        shell: bash
        env:
          GOPRIVATE: ${{ inputs.GOPRIVATE }}

      # Build first so a compilation failure is reported before any optional
      # test runtime setup. Tests then use the same runner and Go build cache.
      - name: Build
        run: ${{ inputs.build_command }}
        shell: bash

      - if: ${{ inputs.install-firebase-tools }}
        name: Set up Java JRE 24
        uses: actions/setup-java@v5
        with:
          java-version: '24'
          java-package: 'jre'
          distribution: 'temurin'

      - if: ${{ inputs.install-firebase-tools }}
        name: Set up Node.js LTS
        uses: actions/setup-node@v7
        with:
          node-version: 'lts/*'

      - if: ${{ inputs.install-firebase-tools }}
        name: Install Firebase tools
        run: npm install -g firebase-tools
        # run: curl -sL firebase.tools | bash

      - if: ${{ (!inputs.code_coverage || github.ref != 'refs/heads/main') && inputs.min_test_coverage_percent == '' }}
        run: go test ./...
        name: Run tests without coverage
        shell: bash
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/${{ inputs.GOOGLE_APPLICATION_CREDENTIALS }}

      - if: ${{ inputs.additional_go_test_path }}
        run: go test ${{ inputs.additional_go_test_path }}
        name: Run additional go test
        shell: bash
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/${{ inputs.GOOGLE_APPLICATION_CREDENTIALS }}

      - if: ${{ (inputs.code_coverage && github.ref == 'refs/heads/main') || inputs.min_test_coverage_percent != '' }}
        name: Run tests with coverage
        run: go test ./... -coverprofile=profile.cov -count=1
        shell: bash
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/${{ inputs.GOOGLE_APPLICATION_CREDENTIALS }}

      - if: ${{ inputs.code_coverage && github.ref == 'refs/heads/main' }}
        name: Upload coverage to Coveralls
        uses: shogo82148/actions-goveralls@v1
        continue-on-error: true
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          path-to-profile: profile.cov

      - if: ${{ inputs.min_test_coverage_percent != '' }}
        name: Check test coverage
        shell: bash
        run: |
          total_coverage=$(go tool cover -func=profile.cov | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: $total_coverage%"
          awk -v t="$total_coverage" -v m="${{ inputs.min_test_coverage_percent }}" 'BEGIN { if (t < m) { print "Coverage " t "% is below required " m "%"; exit 1 } }'

      - if: ${{ inputs.min_test_coverage_percent != '' }}
        run: go tool cover -func=profile.cov | tail -n 1

      # Upload only a build that compiled and whose tests (including any
      # configured coverage gate) passed.
      - name: Upload build artifact
        if: ${{ inputs.artifact_name != '' && inputs.artifact_path != '' && (!inputs.artifact_on_main_only || github.ref == 'refs/heads/main') }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
          if-no-files-found: error
          compression-level: 0
          retention-days: ${{ inputs.artifact_retention_days }}

      # A cache key is immutable. Saving from one deterministic job avoids the
      # parallel setup-go cache reservation race in cold CI runs.
      - name: Save Go dependencies and build cache
        if: ${{ success() && steps.restore_go_cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v6
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          # Preserve the key evaluated before Go commands run. `go mod download
          # all` may add checksums to go.sum, and recomputing hashFiles here
          # would save a cache under a key that the next clean checkout never
          # restores.
          key: ${{ steps.restore_go_cache.outputs.cache-primary-key }}

  go_bump:
    name: Bump version
    if: ${{ !inputs.disable-version-bumping && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: [ go_test_build, go_lint ]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Full history + all tags are REQUIRED by the conventional-commit bump step: it derives the next
          # version from every conventional commit SINCE THE LAST TAG. With the default
          # shallow clone (fetch-depth: 1) the step only sees HEAD's message, so a
          # "Merge pull request #N ..." merge commit produces no bump and no tag even when
          # the merged branch contained feat:/fix: commits. fetch-depth: 0 fixes that by
          # letting the step evaluate the whole lastTag..HEAD range. (fetch-depth: 0
          # fetches all tags too, so the previous version is always found.)
          fetch-depth: 0
          # Persist GH_TOKEN so the guarded `git push` of the computed tag below
          # is authenticated the same way the action's push used to be.
          token: ${{ secrets.GH_TOKEN }}

      # git-cliff is language-neutral: it calculates a SemVer bump from Git
      # history and tags, without loading npm plugins or requiring package.json.
      # It does not create a release; the guarded git-tag step below remains the
      # sole publisher. Keep the config runner-local so consumers need no files.
      - if: ${{ github.ref == 'refs/heads/main' }}
        name: Prepare git-cliff configuration
        env:
          PREFIX: ${{ inputs.tag_prefix }}
        run: |
          {
            printf '%s\n' '[bump]'
            printf 'initial_tag = "%s0.0.0"\n' "$PREFIX"
            printf '%s\n' \
              'features_always_bump_minor = true' \
              'breaking_always_bump_major = false' \
              '[git]' \
              'commit_parsers = [{ message = "^(chore|ci|docs|refactor)(\\(.+\\))?:", skip = true }]'
          } > "${RUNNER_TEMP}/cicd-git-cliff.toml"

      # The action prints the proposed tag (with the configured prefix) to its
      # `content` output; the resolver below converts it to bare SemVer.
      # Full history above is required because git-cliff examines commits since
      # the last matching tag. A breaking change under v0 is a minor bump.
      - if: ${{ github.ref == 'refs/heads/main' }}
        id: bump_dry
        name: Compute next version from Git history
        uses: orhun/git-cliff-action@v4.8.0
        with:
          version: v2.13.1
          config: ${{ runner.temp }}/cicd-git-cliff.toml
          args: >-
            --bumped-version
            --tag-pattern ^${{ inputs.tag_prefix }}[0-9]+\.[0-9]+\.[0-9]+$

      # Preserve the reusable workflow's historical default_bump contract by
      # applying that configured bump only when git-cliff found no semantic bump.
      - if: ${{ github.ref == 'refs/heads/main' }}
        id: resolved_bump
        name: Resolve configured default bump
        env:
          PROPOSED_VERSION: ${{ steps.bump_dry.outputs.content }}
          PREFIX: ${{ inputs.tag_prefix }}
          DEFAULT_BUMP: ${{ inputs.default_bump }}
        run: |
          set -euo pipefail
          version_is_greater() {
            local candidate="$1"
            local baseline="$2"
            [ "$candidate" != "$baseline" ] &&
              [ "$(printf '%s\n%s\n' "$baseline" "$candidate" | sort -V | tail -n 1)" = "$candidate" ]
          }
          latest_tag=""
          while IFS= read -r candidate_tag; do
            candidate_version="${candidate_tag#"$PREFIX"}"
            if [[ "$candidate_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              latest_tag="$candidate_tag"
              break
            fi
          done < <(git tag --list "${PREFIX}*" --sort=-v:refname)
          previous_version="${latest_tag#"$PREFIX"}"
          if [ -z "$latest_tag" ] || ! [[ "$previous_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            previous_version="0.0.0"
            latest_tag=""
          fi
          proposed_tag="$(printf '%s' "$PROPOSED_VERSION" | tr -d '\r\n')"
          next_version="${proposed_tag#"$PREFIX"}"
          if [[ "$next_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] && version_is_greater "$next_version" "$previous_version"; then
            printf 'previous_version=%s\nnew_version=%s\nnew_tag=%s%s\nprevious_tag=%s\n' "$previous_version" "$next_version" "$PREFIX" "$next_version" "$latest_tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$DEFAULT_BUMP" = "false" ] || [ -z "$DEFAULT_BUMP" ]; then
            exit 0
          fi
          case "$DEFAULT_BUMP" in patch|minor|major) ;; *) echo "Unsupported default_bump: $DEFAULT_BUMP" >&2; exit 1 ;; esac
          IFS=. read -r major minor patch <<< "$previous_version"
          case "$DEFAULT_BUMP" in
            patch) next_version="$major.$minor.$((patch + 1))" ;;
            minor) next_version="$major.$((minor + 1)).0" ;;
            major) next_version="$((major + 1)).0.0" ;;
          esac
          printf 'previous_version=%s\nnew_version=%s\nnew_tag=%s%s\nprevious_tag=%s\n' "$previous_version" "$next_version" "$PREFIX" "$next_version" "$latest_tag" >> "$GITHUB_OUTPUT"

      - if: ${{ github.ref == 'refs/heads/main' && steps.resolved_bump.outputs.new_version != '' }}
        id: tag_version
        name: Determine and push guarded tag
        env:
          PREV: ${{ steps.resolved_bump.outputs.previous_version }}
          NEXT: ${{ steps.resolved_bump.outputs.new_version }}
          NEXT_TAG: ${{ steps.resolved_bump.outputs.new_tag }}
          PREV_TAG: ${{ steps.resolved_bump.outputs.previous_tag }}
          ALLOW_MAJOR: ${{ inputs.allow_major_version_bump }}
          PREFIX: ${{ inputs.tag_prefix }}
        run: |
          set -euo pipefail
          prev_major="${PREV%%.*}"
          next_major="${NEXT%%.*}"
          tag="$NEXT_TAG"
          if [ "$ALLOW_MAJOR" != "true" ] && [ -n "$PREV" ] && [ "$next_major" -gt "$prev_major" ]; then
            prev_minor="$(printf '%s' "$PREV" | cut -d. -f2)"
            capped="${prev_major}.$((prev_minor + 1)).0"
            tag="${PREFIX}${capped}"
            echo "::warning title=Major bump blocked::A breaking commit since ${PREV_TAG} would bump the MAJOR version (${PREV} -> ${NEXT}). Capping to ${capped} (pre-1.0 / disallowed-major semantics treat a breaking change as a minor bump). Set allow_major_version_bump: true to intend a real major."
          fi
          git tag "$tag"
          git push origin "refs/tags/$tag"
          echo "new_tag=$tag" >> "$GITHUB_OUTPUT"


